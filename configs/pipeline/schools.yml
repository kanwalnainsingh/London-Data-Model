pipeline_name: schools
version: 1
structured_output_format: json
manifest_enabled: true
input_mode: sample
sample_input:
  enabled: true
  schools_path: data/raw/kt19_schools_sample.json
  ofsted_path: data/raw/kt19_ofsted_sample.json
official_input:
  enabled: false
  schools_path: data/raw/gias_establishments.csv
  schools_format: csv
  ofsted_path: data/raw/ofsted_state_funded_schools.csv
  ofsted_format: csv
  merge_key: school_urn
  fetch:
    # Auto-downloads source files when running in official mode.
    # Set skip_if_exists: true (default) to reuse files already in data/raw/.
    # Delete the files in data/raw/ to force a fresh download.
    skip_if_exists: true
    # GIAS: leave blank to auto-use today's dated export URL.
    # Override if the auto-URL fails (check get-information-schools.service.gov.uk/Downloads).
    schools_url:
    # Ofsted: leave blank to auto-resolve from the publications page.
    # Set to a direct ODS URL to skip page resolution (update when Ofsted republishes).
    ofsted_publications_url: https://www.gov.uk/government/publications/five-year-ofsted-inspection-data
    ofsted_url:
  schools_column_map:
    la_code: "LA (code)"
    school_urn: URN
    school_name: EstablishmentName
    address_line_1: Street
    address_line_2: Locality
    address_line_3: Address3
    town: Town
    county: "County (name)"
    postcode: Postcode
    phase: "PhaseOfEducation (name)"
    establishment_type: "TypeOfEstablishment (name)"
    is_open: "EstablishmentStatus (name)"
    easting: Easting
    northing: Northing
  ofsted_column_map:
    school_urn: URN
    ofsted_rating_latest: Overall effectiveness
    ofsted_inspection_date_latest: Published date
    ofsted_quality_of_education: Quality of education
    ofsted_leadership_management: Effectiveness of leadership and management
    ofsted_personal_development: Personal development
    ofsted_behaviour_attitudes: Behaviour and attitudes
    ofsted_sixth_form: "Sixth form provision (where applicable)"
    ofsted_safeguarding: "Safeguarding is effective?"
# ── KS4 (GCSE) performance tables ─────────────────────────────────────────────
# Source: DfE "Find school performance data" — Key Stage 4
#   https://www.find-school-performance-data.service.gov.uk/download-data
#   Select: KS4 / All schools / England / Latest year → download CSV or ZIP
#   Place the extracted CSV at the path below (or set fetch.url for auto-download).
# Column names below match the standard DfE england_ks4final.csv layout.
# If your download uses different headers, update the right-hand values accordingly.
ks4_input:
  enabled: false
  path: data/raw/ks4_performance.csv
  format: csv
  fetch:
    skip_if_exists: true
    # Set to a direct CSV or ZIP URL to enable auto-download, e.g.:
    # url: https://content.explore-education-statistics.service.gov.uk/api/releases/.../files/...
    url:
  column_map:
    school_urn: URN
    ks4_progress8: P8MEA                    # Progress 8 score (school average, e.g. +0.35)
    ks4_attainment8: ATT8SCR                # Attainment 8 score (0-90 range, e.g. 52.3)
    ks4_strong_pass_pct: PTL2BASICS_95      # % grade 5+ English & Maths (strong pass)
    ks4_standard_pass_pct: PTL2BASICS_94    # % grade 4+ English & Maths (standard pass)
# ── KS5 (A-level) performance tables ──────────────────────────────────────────
# Source: DfE "Find school performance data" — Key Stage 5
#   https://www.find-school-performance-data.service.gov.uk/download-data
#   Select: KS5 / All schools / England / Latest year → download CSV or ZIP
#   Place the extracted CSV at the path below (or set fetch.url for auto-download).
# Column names below match the standard DfE england_ks5final.csv layout.
ks5_input:
  enabled: false
  path: data/raw/ks5_performance.csv
  format: csv
  fetch:
    skip_if_exists: true
    # Set to a direct CSV or ZIP URL to enable auto-download, e.g.:
    # url: https://content.explore-education-statistics.service.gov.uk/api/releases/.../files/...
    url:
  column_map:
    school_urn: URN
    ks5_avg_point_score: A_ATT_AVG_PT_SCR   # Average A-level point score per entry
    ks5_a_star_a_pct: A_A_STAR_A            # % A*/A grades
    ks5_pass_rate_pct: A_PASS               # A*-E pass rate %
    ks5_entries: TALLPPE_ALEV_1618          # Total A-level student entries (16-18)
