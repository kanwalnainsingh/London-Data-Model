pipeline_name: schools
version: 1
structured_output_format: json
manifest_enabled: true
input_mode: sample
sample_input:
  enabled: true
  schools_path: data/raw/kt19_schools_sample.json
  ofsted_path: data/raw/kt19_ofsted_sample.json
official_input:
  enabled: false
  schools_path: data/raw/gias_establishments.csv
  schools_format: csv
  ofsted_path: data/raw/ofsted_state_funded_schools.csv
  ofsted_format: csv
  merge_key: school_urn
  fetch:
    # Auto-downloads source files when running in official mode.
    # Set skip_if_exists: true (default) to reuse files already in data/raw/.
    # Delete the files in data/raw/ to force a fresh download.
    skip_if_exists: true
    # GIAS: leave blank to auto-use today's dated export URL.
    # Override if the auto-URL fails (check get-information-schools.service.gov.uk/Downloads).
    schools_url:
    # Ofsted: leave blank to auto-resolve from the publications page.
    # Set to a direct ODS URL to skip page resolution (update when Ofsted republishes).
    ofsted_publications_url: https://www.gov.uk/government/publications/five-year-ofsted-inspection-data
    ofsted_url:
  schools_column_map:
    la_code: "LA (code)"
    school_urn: URN
    school_name: EstablishmentName
    address_line_1: Street
    address_line_2: Locality
    address_line_3: Address3
    town: Town
    county: County
    postcode: Postcode
    phase: PhaseOfEducation
    establishment_type: TypeOfEstablishment
    is_open: EstablishmentStatus
    latitude: Latitude
    longitude: Longitude
  ofsted_column_map:
    school_urn: URN
    ofsted_rating_latest: Overall effectiveness
    ofsted_inspection_date_latest: Inspection end date
    ofsted_report_url: Web link
